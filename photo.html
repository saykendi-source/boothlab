<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LabShot – Foto Kamu</title>
  <style>
    *{box-sizing:border-box;margin:0}
    body{font-family:Inter,system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;
      padding:16px;background:linear-gradient(135deg,#fffaf0,#ecfeff)}
    .card{width:min(440px,100%);background:#fff;border:1px solid #e5e7eb;border-radius:22px;
      padding:22px;box-shadow:0 18px 50px rgba(15,79,62,.12);text-align:center}
    .brand{font-size:22px;font-weight:900;color:#0f4f3e;margin-bottom:14px}
    .status{padding:9px 16px;border-radius:999px;font-size:13px;font-weight:600;
      margin-bottom:14px;display:inline-block}
    .status.wait{background:#d9f4ec;color:#065f46}
    .status.ok  {background:#d1fae5;color:#047857}
    .status.err {background:#fee2e2;color:#b91c1c}
    .spin{width:44px;height:44px;border:4px solid #d9f4ec;border-top-color:#2dd4bf;
      border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    img.photo{display:block;width:100%;border-radius:14px;margin:14px 0;background:#f8fafc}
    a.btn,button.btn{display:flex;align-items:center;justify-content:center;gap:7px;
      width:100%;padding:12px;border:0;border-radius:999px;font-size:14px;font-weight:800;
      text-decoration:none;cursor:pointer;margin-top:8px}
    .btn-dl{background:linear-gradient(135deg,#2dd4bf,#0d9488);color:#fff}
    .btn-op{background:#f1f5f9;color:#0f3027;border:1px solid #e5e7eb}
    .hint{font-size:11px;color:#6b7280;margin-top:10px;line-height:1.5}
    .hidden{display:none}
  </style>
</head>
<body>
<div class="card">
  <div class="brand">LabShot</div>
  <span id="statusEl" class="status wait">Memuat foto…</span>
  <div id="spinner" class="spin"></div>
  <img id="photo" class="photo hidden" alt="Hasil LabShot">
  <a id="btnDl"  class="btn btn-dl hidden" download="labshot.jpg">⬇ Download Foto</a>
  <a id="btnOp"  class="btn btn-op hidden" target="_blank">Buka Penuh</a>
  <p id="hint"   class="hint hidden">Tekan & tahan gambar lalu pilih Simpan jika tombol tidak bekerja.</p>
</div>
<script>
  const APPS_URL = 'https://script.google.com/macros/s/AKfycbyo7rb9TPvHjp6NJNphJfgirDSpkkiAWo_srxlpi1qsPQWbAQGGAIzW3t3lLxt6tq4QLw/exec';
  const MAX_TRY  = 60;
  const INTERVAL = 1500;

  const $  = id => document.getElementById(id);
  const st = $('statusEl'), sp=$('spinner');
  const ph = $('photo'), dl=$('btnDl'), op=$('btnOp'), hint=$('hint');

  const fileName = new URLSearchParams(location.search).get('n');

  if (!fileName) {
    st.className='status err'; st.textContent='Link tidak valid.';
    sp.style.display='none';
  } else {
    wait(fileName);
  }

  async function wait(name) {
    const url = APPS_URL + '?n=' + encodeURIComponent(name);
    for (let i=1; i<=MAX_TRY; i++) {
      st.textContent = i===1 ? 'Memuat foto…' : `Menunggu foto… (${i}/${MAX_TRY})`;
      try {
        const res  = await fetch(url);
        const text = await res.text();
        // Cari data URL di dalam HTML yang dikembalikan Apps Script
        const match = text.match(/src="(data:image\/[^"]{20,})"/);
        if (match) {
          const dataUrl = match[1];
          st.className='status ok'; st.textContent='Foto siap ✓';
          sp.style.display='none';
          ph.src=dataUrl; ph.classList.remove('hidden');
          dl.href=dataUrl; dl.download=name; dl.classList.remove('hidden');
          op.href=dataUrl; op.classList.remove('hidden');
          hint.classList.remove('hidden');
          return;
        }
      } catch(e) { console.log('retry',i,e.message); }
      await new Promise(r=>setTimeout(r, INTERVAL));
    }
    st.className='status err'; st.textContent='Foto belum tersedia.';
    sp.style.display='none';
  }
</script>
</body>
</html>
